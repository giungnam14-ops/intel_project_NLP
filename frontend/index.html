<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5b6ef4" />
    <meta name="description" content="문요 - 긴 문서 속 꼭 확인해야 할 요점과 체크리스트를 빠르게 확인하는 AI 문서 요점 체크 앱" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="문요" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>문요</title>
    <style>
      /* App-launch splash — shows instantly while the bundle loads, then fades. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: linear-gradient(135deg, #5b6ef4 0%, #8b5cf6 100%);
        transition: opacity 0.4s ease;
        font-family: 'Pretendard', 'Noto Sans KR', Arial, sans-serif;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .mark {
        width: 84px; height: 84px; border-radius: 24px;
        display: flex; align-items: center; justify-content: center;
        font-size: 42px; font-weight: 800; color: #fff;
        background: rgba(255, 255, 255, 0.18);
        box-shadow: 0 18px 40px rgba(40, 36, 99, 0.25);
      }
      #splash .name { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
      #splash .tag { font-size: 13px; color: rgba(255, 255, 255, 0.92); }
      #splash .dots { display: flex; gap: 6px; margin-top: 8px; }
      #splash .dots i {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        animation: splashPulse 1s infinite ease-in-out;
      }
      #splash .dots i:nth-child(2) { animation-delay: 0.15s; }
      #splash .dots i:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.35; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .dots i { animation: none; }
        #splash { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <div class="mark">문</div>
      <div class="name">문요</div>
      <div class="tag">AI 문서 요점 체크</div>
      <div class="dots"><i></i><i></i><i></i></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
